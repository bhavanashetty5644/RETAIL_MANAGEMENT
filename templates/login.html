<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Login — RetailOS</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;font-family:'Segoe UI',sans-serif;background:linear-gradient(135deg,#0F0C29,#302B63,#24243E);display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative}
.orb{position:fixed;border-radius:50%;filter:blur(80px);pointer-events:none;z-index:0}
.orb1{width:500px;height:500px;background:radial-gradient(circle,rgba(124,58,237,.5),transparent);top:-150px;left:-150px;animation:f1 9s ease-in-out infinite}
.orb2{width:400px;height:400px;background:radial-gradient(circle,rgba(236,72,153,.4),transparent);bottom:-100px;right:-100px;animation:f2 11s ease-in-out infinite}
.orb3{width:300px;height:300px;background:radial-gradient(circle,rgba(59,130,246,.35),transparent);top:50%;left:50%;animation:f3 7s ease-in-out infinite}
@keyframes f1{0%,100%{transform:translate(0,0)}50%{transform:translate(80px,80px)}}
@keyframes f2{0%,100%{transform:translate(0,0)}50%{transform:translate(-60px,-70px)}}
@keyframes f3{0%,100%{transform:translate(-50%,-50%)}50%{transform:translate(-40%,-60%)}}
.login-box{position:relative;z-index:1;width:100%;max-width:440px;padding:20px}
.card{background:rgba(255,255,255,0.08);backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);border:1px solid rgba(255,255,255,0.15);border-radius:24px;padding:44px 40px;box-shadow:0 32px 64px rgba(0,0,0,.4)}
.logo{text-align:center;margin-bottom:32px}
.logo .icon{width:68px;height:68px;background:linear-gradient(135deg,#7C3AED,#EC4899);border-radius:20px;display:flex;align-items:center;justify-content:center;font-size:2rem;margin:0 auto 16px;box-shadow:0 10px 30px rgba(124,58,237,.5)}
.logo h2{font-size:1.8rem;font-weight:800;background:linear-gradient(90deg,#A78BFA,#F9A8D4);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.logo p{color:rgba(255,255,255,.5);font-size:.85rem;margin-top:4px}
.form-label{color:rgba(255,255,255,.8);font-size:.85rem;font-weight:500;margin-bottom:6px}
.form-control{background:rgba(255,255,255,.1)!important;border:1px solid rgba(255,255,255,.18)!important;color:#fff!important;border-radius:12px!important;padding:12px 16px!important;font-size:.95rem}
.form-control::placeholder{color:rgba(255,255,255,.35)!important}
.form-control:focus{background:rgba(255,255,255,.15)!important;box-shadow:0 0 0 3px rgba(124,58,237,.35)!important;border-color:#A78BFA!important;outline:none}
.input-group-text{background:rgba(255,255,255,.1)!important;border:1px solid rgba(255,255,255,.18)!important;color:rgba(255,255,255,.6)!important;border-radius:12px 0 0 12px!important;border-right:none!important}
.input-group .form-control{border-radius:0 12px 12px 0!important;border-left:none!important}
.btn-login{width:100%;padding:13px;background:linear-gradient(135deg,#7C3AED,#9333EA);border:none;color:#fff;font-size:1rem;font-weight:700;border-radius:12px;transition:.3s;letter-spacing:.02em;margin-top:8px}
.btn-login:hover{transform:translateY(-2px);box-shadow:0 12px 28px rgba(124,58,237,.55);color:#fff}
.divider{display:flex;align-items:center;gap:12px;margin:20px 0;color:rgba(255,255,255,.3);font-size:.8rem}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:rgba(255,255,255,.12)}
.register-link{text-align:center;font-size:.85rem;color:rgba(255,255,255,.55)}
.register-link a{color:#A78BFA;font-weight:600;text-decoration:none}
.register-link a:hover{color:#C4B5FD}
.alert-err{background:rgba(239,68,68,.2);border:1px solid rgba(239,68,68,.35);border-radius:12px;color:#FCA5A5;padding:12px 16px;font-size:.87rem;margin-bottom:18px}
.alert-ok{background:rgba(16,185,129,.2);border:1px solid rgba(16,185,129,.35);border-radius:12px;color:#6EE7B7;padding:12px 16px;font-size:.87rem;margin-bottom:18px}
</style>
</head>
<body>
<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="orb orb3"></div>
<div class="login-box">
  <div class="card">
    <div class="logo">
      <div class="icon"><i class="bi bi-bag-heart-fill" style="color:#fff"></i></div>
      <h2>RetailOS</h2>
      <p>Smart Retail Management System</p>
    </div>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in messages %}
        <div class="{% if cat=='error' %}alert-err{% else %}alert-ok{% endif %}">
          <i class="bi {% if cat=='error' %}bi-exclamation-triangle-fill{% else %}bi-check-circle-fill{% endif %} me-1"></i> {{ msg }}
        </div>
      {% endfor %}
    {% endwith %}
    <form method="POST" action="/login">
      <div class="mb-3">
        <label class="form-label">Email Address</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-envelope-fill"></i></span>
          <input type="email" name="email" class="form-control" placeholder="admin@store.com" required autocomplete="email"/>
        </div>
      </div>
      <div class="mb-4">
        <label class="form-label">Password</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
          <input type="password" name="password" id="pwInput" class="form-control" placeholder="••••••••" required autocomplete="current-password"/>
          <span class="input-group-text" style="border-radius:0 12px 12px 0!important;border-left:none!important;cursor:pointer" onclick="togglePw()"><i class="bi bi-eye" id="eyeIcon"></i></span>
        </div>
      </div>
      <button type="submit" class="btn-login"><i class="bi bi-box-arrow-in-right me-2"></i>Sign In</button>
    </form>
    <div class="divider">or</div>
    <div class="register-link">Don't have an account? <a href="/register">Create one</a></div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
function togglePw(){
  const i=document.getElementById('pwInput');
  const e=document.getElementById('eyeIcon');
  if(i.type==='password'){i.type='text';e.className='bi bi-eye-slash'}
  else{i.type='password';e.className='bi bi-eye'}
}
</script>
</body>
</html>
