<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Server Error — RetailOS</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
<style>
body{background:linear-gradient(135deg,#0F0C29,#302B63,#24243E);color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:'Segoe UI',sans-serif}
.box{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:20px;padding:48px;text-align:center;max-width:520px;width:90%}
.err-badge{background:rgba(248,113,113,.12);border:1px solid rgba(248,113,113,.25);border-radius:12px;padding:12px 16px;font-family:monospace;font-size:.78rem;color:#F87171;word-break:break-all;text-align:left;margin-top:16px;max-height:120px;overflow-y:auto}
</style>
</head>
<body>
<div class="box">
  <div style="font-size:3rem;margin-bottom:16px">⚠️</div>
  <h2 style="font-weight:800;margin-bottom:8px">Server Error</h2>
  <p style="color:rgba(255,255,255,.55);margin-bottom:8px">
    Something went wrong on the server. This is usually a database connection issue or a missing table in Supabase.
  </p>
  {% if error %}
  <div class="err-badge">{{ error }}</div>
  {% endif %}
  <div style="margin-top:28px;display:flex;gap:10px;justify-content:center;flex-wrap:wrap">
    <a href="javascript:history.back()" class="btn btn-outline-light">← Go Back</a>
    <a href="/dashboard" class="btn btn-light">🏠 Dashboard</a>
  </div>
  <p style="margin-top:20px;font-size:.75rem;color:rgba(255,255,255,.3)">
    If this keeps happening, check your Supabase URL/key in <code>.env</code> and ensure all tables exist.
  </p>
</div>
</body>
</html>
