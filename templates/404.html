<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"/><title>404 — RetailOS</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
<style>
body{min-height:100vh;background:linear-gradient(135deg,#0F0C29,#302B63,#24243E);display:flex;align-items:center;justify-content:center;font-family:'Segoe UI',sans-serif;color:#fff}
.box{background:rgba(255,255,255,.08);backdrop-filter:blur(24px);border:1px solid rgba(255,255,255,.15);border-radius:24px;padding:60px 50px;text-align:center;max-width:480px}
h1{font-size:6rem;font-weight:900;background:linear-gradient(90deg,#A78BFA,#F9A8D4);-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1}
</style></head>
<body>
<div class="box">
  <h1>404</h1>
  <h3 style="margin:16px 0 8px;font-weight:700">Page Not Found</h3>
  <p style="color:rgba(255,255,255,.5)">The page you're looking for doesn't exist.</p>
  <a href="/dashboard" class="btn mt-4 px-4 py-2" style="background:linear-gradient(135deg,#7C3AED,#9333EA);color:#fff;border-radius:12px;font-weight:600;text-decoration:none">
    <i class="bi bi-house-fill me-2"></i>Back to Dashboard
  </a>
</div>
</body></html>
